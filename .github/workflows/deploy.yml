name: FastAPI STT MLOps CI/CD

# main 브랜치에 push 될 때마다 파이프라인 실행
on:
  push:
    branches: [ "main" ] # 사용하는 기본 브랜치명에 맞게 수정하세요 (예: master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 저장소의 코드를 Actions 서버로 가져오기
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Docker Hub 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. 도커 이미지 빌드 및 푸시 (앞서 최적화한 .dockerignore가 여기서 빛을 발합니다!)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stt-fastapi-server:latest # 이미지 이름은 자유롭게 지정

    # 4. AWS EC2에 SSH 접속 후 배포 스크립트 실행
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 최신 이미지 Pull
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stt-fastapi-server:latest
          
          # 기존에 실행 중인 컨테이너가 있다면 중지 및 삭제 (트러블슈팅 없이 부드러운 교체)
          sudo docker stop stt-server || true
          sudo docker rm stt-server || true
          
          # 새로운 컨테이너 실행 (8000 포트 매핑, 재부팅 시 자동 실행 적용)
          sudo docker run -d \
            -p 8000:8000 \
            --name stt-server \
            --restart always \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=ap-northeast-2 \
            ${{ secrets.DOCKERHUB_USERNAME }}/stt-fastapi-server:latest
          
          # 사용하지 않는 잉여 도커 이미지 정리 (EC2 용량 확보)
          sudo docker image prune -a -f